<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>銷售修煉場 - Sales Dojo</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e1a;--bg2:#111827;--bg3:#1a2035;
  --gold:#fbbf24;--gold2:#f59e0b;--orange:#f97316;--fire:#ef4444;
  --blue:#3b82f6;--cyan:#06b6d4;--purple:#8b5cf6;--green:#22c55e;
  --text:#e5e7eb;--text2:#9ca3af;--text3:#6b7280;
  --card-bg:#1e293b;--card-border:#334155;
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
a{color:var(--gold);text-decoration:none}

/* ===== WELCOME SCREEN ===== */
#welcome-screen{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s}
#welcome-screen.hidden{opacity:0;pointer-events:none}
#welcome-screen h1{font-size:3rem;color:var(--gold);text-shadow:0 0 30px rgba(251,191,36,.5);margin-bottom:.5rem;animation:pulse-glow 2s infinite}
#welcome-screen .subtitle{color:var(--text2);font-size:1.1rem;margin-bottom:2rem}
#welcome-screen .coach-big{font-size:6rem;margin-bottom:1rem;animation:bounce-in .8s}
#welcome-screen input{background:var(--bg3);border:2px solid var(--gold);color:var(--gold);padding:.8rem 1.5rem;font-size:1.2rem;border-radius:12px;text-align:center;width:280px;margin-bottom:1.5rem}
#welcome-screen input::placeholder{color:var(--text3)}
#welcome-screen .start-btn{background:linear-gradient(135deg,var(--gold),var(--orange));color:#000;font-size:1.3rem;font-weight:900;padding:1rem 3rem;border-radius:16px;transition:all .3s;box-shadow:0 0 20px rgba(251,191,36,.3)}
#welcome-screen .start-btn:hover{transform:scale(1.05);box-shadow:0 0 40px rgba(251,191,36,.5)}

/* ===== TOP STATUS BAR ===== */
#status-bar{position:sticky;top:0;z-index:100;background:linear-gradient(180deg,var(--bg2),transparent);backdrop-filter:blur(12px);padding:12px 24px;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--card-border)}
.player-info{display:flex;align-items:center;gap:10px}
.player-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--orange));display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:900;color:#000}
.player-name{font-weight:700;font-size:1rem}
.player-title{color:var(--gold);font-size:.9rem;font-weight:700}
.level-badge{background:linear-gradient(135deg,var(--gold),var(--orange));color:#000;font-weight:900;padding:2px 10px;border-radius:20px;font-size:.92rem}
.exp-bar-wrap{flex:1;max-width:300px}
.exp-label{font-size:.78rem;color:var(--text2);display:flex;justify-content:space-between;margin-bottom:2px}
.exp-bar{height:8px;background:var(--bg);border-radius:8px;overflow:hidden}
.exp-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--orange));border-radius:8px;transition:width .8s ease;width:0%}
.stats{display:flex;gap:16px;margin-left:auto;font-size:.95rem}
.stat{display:flex;align-items:center;gap:4px;color:var(--text2)}
.stat .icon{font-size:1.1rem}

/* ===== NAV TABS ===== */
.nav-tabs{display:flex;justify-content:center;gap:8px;padding:12px;background:var(--bg2)}
.nav-tab{padding:10px 24px;border-radius:10px;background:var(--bg3);color:var(--text2);font-weight:700;font-size:1rem;transition:all .3s}
.nav-tab.active,.nav-tab:hover{background:linear-gradient(135deg,var(--gold),var(--orange));color:#000}

/* ===== MAP VIEW ===== */
#map-view{padding:40px 20px;max-width:600px;margin:0 auto;position:relative}
.map-path{position:relative;display:flex;flex-direction:column;align-items:center;gap:0}
.map-connector{width:4px;height:40px;background:var(--card-border);position:relative}
.map-connector.completed{background:linear-gradient(180deg,var(--gold),var(--orange))}
.map-node{position:relative;width:100%;display:flex;align-items:center;justify-content:center;padding:6px 0}
.map-node:nth-child(4n+1) .node-inner{margin-left:80px}
.map-node:nth-child(4n+3) .node-inner{margin-right:80px}
.node-inner{display:flex;align-items:center;gap:16px;padding:16px 24px;border-radius:20px;background:var(--card-bg);border:2px solid var(--card-border);cursor:pointer;transition:all .3s;width:fit-content;max-width:420px}
.node-inner:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,.4)}
.node-inner.locked{opacity:.45;cursor:not-allowed;filter:grayscale(.8)}
.node-inner.active{border-color:var(--gold);box-shadow:0 0 20px rgba(251,191,36,.2);animation:pulse-border 2s infinite}
.node-inner.completed{border-color:var(--green);background:linear-gradient(135deg,rgba(34,197,94,.08),var(--card-bg))}
.node-icon{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;flex-shrink:0}
.node-info h3{font-size:1.1rem;margin-bottom:2px}
.node-info .node-sub{font-size:.9rem;color:var(--text2)}
.node-status{margin-left:auto;font-size:1.2rem}

/* ===== STAGE DETAIL VIEW ===== */
#stage-view{display:none;padding:20px;max-width:800px;margin:0 auto}
.stage-back{background:var(--bg3);color:var(--text);padding:8px 16px;border-radius:10px;font-size:1rem;margin-bottom:16px;display:inline-flex;align-items:center;gap:6px}
.stage-header{text-align:center;margin-bottom:24px}
.stage-header .stage-icon{font-size:3rem;margin-bottom:8px}
.stage-header h2{font-size:1.6rem;color:var(--gold);margin-bottom:4px}
.stage-header .stage-goal{color:var(--text2);font-size:1rem;line-height:1.7}

/* Coach Speech Bubble */
.coach-speech{background:linear-gradient(135deg,#1a1a2e,#16213e);border:2px solid var(--orange);border-radius:20px;padding:20px 24px;margin-bottom:28px;position:relative}
.coach-speech::before{content:'';position:absolute;top:-12px;left:30px;border:8px solid transparent;border-bottom-color:var(--orange)}
.coach-speech .coach-avatar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.coach-speech .coach-avatar-row .avatar{font-size:1.6rem}
.coach-speech .coach-avatar-row .name{font-weight:900;color:var(--orange);font-size:1rem}
.coach-speech .speech-text{color:var(--text);font-size:1.1rem;line-height:1.9}
.coach-speech .speech-text .highlight{color:var(--gold);font-weight:900}

/* Section Titles */
.section-title{font-size:1.2rem;font-weight:900;margin:24px 0 12px;display:flex;align-items:center;gap:8px;color:var(--gold)}

/* Skill Cards Grid */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:24px}
.skill-card{perspective:800px;height:200px;cursor:pointer}
.skill-card-inner{position:relative;width:100%;height:100%;transition:transform .6s;transform-style:preserve-3d}
.skill-card.flipped .skill-card-inner{transform:rotateY(180deg)}
.skill-card-front,.skill-card-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:16px;padding:16px;display:flex;flex-direction:column}
.skill-card-front{background:linear-gradient(135deg,#1a1a2e,#0f172a);border:2px solid var(--card-border);align-items:center;justify-content:center;text-align:center}
.skill-card-front .card-mystery{font-size:3rem;margin-bottom:8px;opacity:.6}
.skill-card-front .card-rarity{font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:2px}
.skill-card-back{background:linear-gradient(135deg,#1e293b,#0f172a);border:2px solid var(--gold);transform:rotateY(180deg);justify-content:space-between}
.skill-card-back .card-title{font-size:1rem;font-weight:900;color:var(--gold);margin-bottom:6px}
.skill-card-back .card-content{font-size:.92rem;color:var(--text);line-height:1.75;flex:1;overflow-y:auto}
.skill-card-back .card-collected{text-align:right;font-size:.82rem;color:var(--green);font-weight:700}
.rarity-rare .skill-card-front{border-color:var(--blue)}
.rarity-rare .skill-card-back{border-color:var(--blue)}
.rarity-legend .skill-card-front{border-color:var(--gold);box-shadow:0 0 15px rgba(251,191,36,.15)}
.rarity-legend .skill-card-back{border-color:var(--gold);box-shadow:0 0 15px rgba(251,191,36,.15)}

/* Video List + Accordion */
.video-list{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.video-guide{max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s;padding:0 16px;background:linear-gradient(135deg,rgba(59,130,246,.05),var(--card-bg));border-radius:0 0 14px 14px;margin-top:-2px;border:1px solid transparent}
.video-guide.open{max-height:600px;padding:14px 16px;border-color:var(--card-border);border-top:none}
.video-guide .guide-row{display:flex;gap:8px;margin-bottom:10px;font-size:.95rem;line-height:1.8}
.video-guide .guide-row:last-child{margin-bottom:0}
.video-guide .guide-icon{flex-shrink:0;font-size:1rem;margin-top:2px}
.video-guide .guide-label{font-weight:900;color:var(--gold);min-width:70px;flex-shrink:0}
.video-guide .guide-text{color:var(--text)}
.video-guide .guide-quote{color:var(--orange);font-style:italic}
.video-guide-btn{display:flex;align-items:center;gap:4px;padding:6px 14px;background:rgba(59,130,246,.1);border:1px solid var(--blue);border-radius:8px;font-size:.85rem;color:var(--blue);font-weight:700;margin-top:4px;cursor:pointer;transition:all .2s}
.video-guide-btn:hover{background:rgba(59,130,246,.2)}
.video-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--card-bg);border-radius:14px;border:1px solid var(--card-border);transition:all .3s;cursor:pointer}
.video-item:hover{border-color:var(--blue);transform:translateX(4px)}
.video-item.watched{border-color:var(--green);background:linear-gradient(135deg,rgba(34,197,94,.05),var(--card-bg))}
.video-item.must-watch{border-color:var(--gold);border-width:2px}
.video-thumb{width:48px;height:48px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.video-info{flex:1;min-width:0}
.video-info .video-title{font-size:1rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.video-info .video-badge{display:inline-block;font-size:.75rem;padding:1px 6px;border-radius:6px;font-weight:700;margin-top:2px}
.badge-must{background:var(--gold);color:#000}
.badge-watched{background:var(--green);color:#000}
.video-check{width:28px;height:28px;border-radius:50%;border:2px solid var(--card-border);display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;transition:all .3s}
.video-item.watched .video-check{background:var(--green);border-color:var(--green);color:#000}

/* Boss Battle */
.boss-section{background:linear-gradient(135deg,rgba(239,68,68,.08),var(--card-bg));border:2px solid var(--fire);border-radius:20px;padding:24px;margin-top:24px}
.boss-header{text-align:center;margin-bottom:16px}
.boss-header .boss-icon{font-size:3rem;animation:boss-float 3s ease-in-out infinite}
.boss-header h3{color:var(--fire);font-size:1.2rem;margin-top:4px}
.boss-header p{color:var(--text2);font-size:.95rem}
.quiz-question{background:var(--bg3);border-radius:14px;padding:16px;margin-bottom:12px}
.quiz-question .q-text{font-size:1.05rem;font-weight:700;margin-bottom:10px}
.quiz-options{display:flex;flex-direction:column;gap:6px}
.quiz-opt{padding:12px 16px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:10px;font-size:1rem;text-align:left;color:var(--text);transition:all .3s}
.quiz-opt:hover{border-color:var(--blue);background:rgba(59,130,246,.1)}
.quiz-opt.correct{border-color:var(--green);background:rgba(34,197,94,.15);color:var(--green)}
.quiz-opt.wrong{border-color:var(--fire);background:rgba(239,68,68,.15);color:var(--fire)}
.quiz-opt.disabled{pointer-events:none;opacity:.6}
.boss-result{text-align:center;padding:20px;display:none}
.boss-result h3{font-size:1.3rem;margin-bottom:8px}
.boss-result .result-btn{margin-top:12px;padding:10px 28px;border-radius:12px;font-weight:900;font-size:1rem}

/* ===== COLLECTION VIEW ===== */
#collection-view{display:none;padding:20px;max-width:900px;margin:0 auto}
.collection-stage{margin-bottom:28px}
.collection-stage-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.collection-stage-header h3{font-size:1.1rem;color:var(--gold)}
.collection-progress{font-size:.9rem;color:var(--text2);margin-left:auto}
.collection-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:660px;margin:0 auto}
.mini-card{padding:12px;background:var(--card-bg);border-radius:12px;border:1px solid var(--card-border);font-size:.88rem;text-align:center;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.mini-card.collected{border-color:var(--gold);background:linear-gradient(135deg,rgba(251,191,36,.05),var(--card-bg))}
.mini-card.locked{opacity:.3;filter:grayscale(1)}
.mini-card .mini-icon{font-size:1.4rem;margin-bottom:4px}
.mini-card .mini-name{font-weight:700;font-size:.85rem}

/* ===== COACH CHAT BUBBLE ===== */
#coach-bubble{position:fixed;bottom:20px;right:20px;z-index:200}
#coach-toggle{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--fire));display:flex;align-items:center;justify-content:center;font-size:2rem;box-shadow:0 4px 20px rgba(249,115,22,.4);transition:all .3s;animation:coach-pulse 3s infinite}
#coach-toggle:hover{transform:scale(1.1)}
#coach-chat{display:none;position:absolute;bottom:76px;right:0;width:340px;background:var(--bg2);border:2px solid var(--orange);border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,.5);overflow:hidden}
#coach-chat.open{display:block;animation:slide-up .3s}
.chat-header{background:linear-gradient(135deg,var(--orange),var(--fire));padding:12px 16px;display:flex;align-items:center;gap:8px;color:#000;font-weight:900}
.chat-messages{height:260px;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.chat-msg{max-width:85%;padding:10px 14px;border-radius:14px;font-size:.95rem;line-height:1.7}
.chat-msg.coach{background:var(--bg3);border:1px solid var(--card-border);align-self:flex-start;border-bottom-left-radius:4px}
.chat-msg.player{background:linear-gradient(135deg,var(--blue),var(--purple));align-self:flex-end;border-bottom-right-radius:4px}
.chat-options{padding:8px;border-top:1px solid var(--card-border);display:flex;flex-direction:column;gap:4px}
.chat-opt-btn{padding:10px 14px;background:var(--bg3);border:1px solid var(--card-border);border-radius:10px;font-size:.92rem;color:var(--text);text-align:left;transition:all .2s}
.chat-opt-btn:hover{border-color:var(--orange);background:rgba(249,115,22,.1)}

/* ===== LEVEL UP OVERLAY ===== */
#levelup-overlay{position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;flex-direction:column}
#levelup-overlay.show{display:flex;animation:fade-in .3s}
.levelup-content{text-align:center;animation:scale-bounce .6s}
.levelup-content .lv-icon{font-size:5rem;margin-bottom:8px}
.levelup-content .lv-text{font-size:1.2rem;color:var(--text2);margin-bottom:4px}
.levelup-content .lv-title{font-size:2.5rem;font-weight:900;color:var(--gold);text-shadow:0 0 40px rgba(251,191,36,.5);margin-bottom:4px}
.levelup-content .lv-subtitle{font-size:1.1rem;color:var(--orange);font-weight:700;margin-bottom:20px}
.levelup-content .lv-btn{background:linear-gradient(135deg,var(--gold),var(--orange));color:#000;font-weight:900;padding:12px 36px;border-radius:14px;font-size:1.1rem}
.levelup-sparks{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.spark{position:absolute;width:4px;height:4px;background:var(--gold);border-radius:50%;animation:spark-fly 1.5s ease-out forwards}

/* ===== ANIMATIONS ===== */
@keyframes pulse-glow{0%,100%{text-shadow:0 0 20px rgba(251,191,36,.4)}50%{text-shadow:0 0 40px rgba(251,191,36,.8)}}
@keyframes pulse-border{0%,100%{box-shadow:0 0 10px rgba(251,191,36,.1)}50%{box-shadow:0 0 25px rgba(251,191,36,.3)}}
@keyframes bounce-in{0%{transform:scale(0) rotate(-20deg)}60%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0)}}
@keyframes boss-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes coach-pulse{0%,100%{box-shadow:0 4px 20px rgba(249,115,22,.4)}50%{box-shadow:0 4px 35px rgba(249,115,22,.7)}}
@keyframes slide-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes scale-bounce{0%{transform:scale(0)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes spark-fly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}
@keyframes typewriter{from{width:0}to{width:100%}}

/* ===== CARD REVIEW MODAL ===== */
#card-modal-overlay{position:fixed;inset:0;z-index:9990;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;padding:20px}
#card-modal-overlay.show{display:flex;animation:fade-in .3s}
.card-modal{perspective:1000px;width:320px;height:420px}
.card-modal-inner{position:relative;width:100%;height:100%;transition:transform .8s;transform-style:preserve-3d}
.card-modal.flipping .card-modal-inner{transform:rotateY(180deg)}
.card-modal-front,.card-modal-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px}
.card-modal-front{background:linear-gradient(135deg,#1a1a2e,#0f172a);border:3px solid var(--card-border);text-align:center}
.card-modal-front .cm-mystery{font-size:4rem;margin-bottom:12px}
.card-modal-front .cm-tap{color:var(--text3);font-size:.95rem}
.card-modal-back{background:linear-gradient(135deg,#1e293b,#0f172a);border:3px solid var(--gold);transform:rotateY(180deg);justify-content:flex-start;text-align:left;box-shadow:0 0 30px rgba(251,191,36,.2)}
.card-modal-back .cm-rarity{font-size:.7rem;color:var(--orange);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;font-weight:900}
.card-modal-back .cm-title{font-size:1.2rem;font-weight:900;color:var(--gold);margin-bottom:16px}
.card-modal-back .cm-content{font-size:1.05rem;color:var(--text);line-height:2;flex:1}
.card-modal-back .cm-close{margin-top:16px;padding:8px 24px;background:linear-gradient(135deg,var(--gold),var(--orange));color:#000;font-weight:900;border-radius:10px;font-size:.95rem;align-self:center}
.cm-legend .card-modal-back{border-color:var(--gold);box-shadow:0 0 35px rgba(251,191,36,.25)}
.cm-rare .card-modal-back{border-color:var(--blue);box-shadow:0 0 30px rgba(59,130,246,.2)}

/* Collection clickable */
.mini-card.collected{cursor:pointer;transition:all .3s}
.mini-card.collected:hover{transform:translateY(-4px);box-shadow:0 4px 20px rgba(251,191,36,.2);border-color:var(--gold)}

/* ===== STAGE 8 - 宗師殿堂 ===== */
#stage8-view{display:none;padding:20px;max-width:900px;margin:0 auto}

/* Fireworks overlay */
#fireworks-overlay{position:fixed;inset:0;z-index:9997;pointer-events:none;overflow:hidden;display:none}
#fireworks-overlay.show{display:block}
.firework{position:absolute;width:6px;height:6px;border-radius:50%;animation:firework-burst 1.5s ease-out forwards}
@keyframes firework-burst{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--fx),var(--fy)) scale(0)}}

/* Grand entrance */
.grand-entrance{text-align:center;padding:40px 20px;animation:fade-in 1s}
.grand-entrance .crown{font-size:5rem;animation:boss-float 3s ease-in-out infinite}
.grand-entrance h1{font-size:2.4rem;color:var(--gold);text-shadow:0 0 40px rgba(251,191,36,.6);margin:12px 0 4px}
.grand-entrance .grand-sub{color:var(--text2);font-size:1.1rem}

/* Tribute Card */
.tribute-card{background:linear-gradient(135deg,#1a1a2e,#0f172a);border:3px solid var(--gold);border-radius:24px;padding:32px;margin:28px 0;position:relative;overflow:hidden;box-shadow:0 0 40px rgba(251,191,36,.15)}
.tribute-card::before{content:'';position:absolute;inset:-2px;border-radius:24px;background:linear-gradient(45deg,var(--gold),var(--orange),var(--gold),var(--orange));z-index:-1;animation:border-glow 4s linear infinite;background-size:300% 300%}
@keyframes border-glow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.tribute-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}

/* Graduation */

.grad-btn.btn-share{background:linear-gradient(135deg,var(--gold),var(--orange));color:#000}

/* ===== AUDIO PLAYER ===== */

</div>

<!-- ===== STATUS BAR ===== -->

    <div class="player-avatar" id="avatar-letter">?</div>

    </div>

<script>
// ================================================================
// DATA - 所有遊戲資料
// ================================================================
const STAGES = [
  {
    id:1, name:'心火試煉', icon:'🔥', color:'#ef4444',
    subtitle:'入門心態建立與目標設定',
    goal:'建立頂尖業務員的思維模式，克服對拒絕的恐懼，並學會設立明確且可衡量的目標。',
    coachSpeech:'聽好了，小鬼！你以為銷售是天賦？錯！銷售是鍛鍊出來的鋼鐵意志！<span class="highlight">被拒絕100次，你就離成功更近100步！</span>從今天起，我要你記住三個字——「Go for no！」每一個「不」都是你變強的燃料！給我燃起來！🔥',
    cards:[
      {id:'c1-1',title:'尋求拒絕法則',rarity:'legend',content:'將遭到拒絕視為常態，你被拒絕得越多，獲得「好」的機會就越多。藉此克服對拒絕的恐懼。「Go for no!」—— 主動擁抱拒絕，讓恐懼消失！'},
      {id:'c1-2',title:'SMART 目標術',rarity:'rare',content:'設定 SMART 目標並寫下來：具體（Specific）、可衡量（Measurable）、可達成（Achievable）、相關（Relevant）、有時限（Time-bound）。寫下來能將目標植入潛意識，大幅提升達成率。'},
      {id:'c1-3',title:'100通電話法則',rarity:'legend',content:'以聯繫 100 位潛在客戶為目標，不把重點放在是否成交，藉此消除壓力並建立陌生開發的自信。重點不是結果，是練習！'}
    ],
    videos:[
      {title:'How to Sell Like the Most Successful Sales Professionals',url:'https://www.youtube.com/watch?v=9bVTlEw1qjQ',must:true,
        summary:'頂尖 10% 銷售人員擁有三大共同特質：企圖心、克服恐懼的意願、對成功 100% 的絕對承諾。透過「追求拒絕（Go for No）」法則，主動面對被拒絕的恐懼，觸發的「不」越多，得到的「是」就越多。',
        keyQuote:'「你觸發的『不』越多，你能得到的『是』就越多。」',
        action:'採用「追求拒絕」法則——主動尋求被拒絕的機會，將反對意見轉化為成交機會。'},
      {title:'How to Stay Motivated in Sales',url:'https://www.youtube.com/watch?v=_hO6-Vitb1A',must:false,
        summary:'維持銷售動力的關鍵：精準鎖定目標客戶、以情感連結建立信任、多問開放式問題。特別介紹「100 次通話法」——承諾盡快聯絡 100 位潛在客戶，將重點放在聯繫而非成交，藉此減輕壓力。',
        keyQuote:'「講述不是銷售，只有提問才是銷售。」',
        action:'實施「100 次通話法」：兩週內聯絡 100 位新潛在客戶，專注建立聯繫而非成交。'},
      {title:'7 Tips to Help You Become More Goal-Oriented',url:'https://www.youtube.com/watch?v=67iEH_r2zSU',must:false,
        summary:'七步目標設定公式：決定你要什麼、寫下來、設定期限、列出任務清單、整理成計畫、採取行動、每天做一件朝目標邁進的事。「清晰」是成功的核心關鍵字。',
        keyQuote:'「清晰要求你必須對自己是誰、你相信什麼、你真正擅長什麼，有絕對清楚的認知。」',
        action:'用現在式寫下未來 12 個月的十個目標，選出影響最大的一個，每天至少做一件推進它的事。'},
      {title:'How to Build Unshakeable Self-Confidence',url:'https://www.youtube.com/watch?v=uTanI0w7Hig',must:false,
        summary:'阻礙大多數人實現夢想的主因是缺乏對自己能力的信念。建立持久自信的秘訣在於「忠於自己」——與自己最高的價值觀和抱負保持一致。',
        keyQuote:'「如果你知道自己絕對不會失敗，你會敢於夢想哪一件偉大的事情？」',
        action:'問自己：「如果我不會失敗，我敢夢想什麼？」寫下答案，憑信心邁出第一步。'},
      {title:'Why Failure is Good for You',url:'https://www.youtube.com/watch?v=Q7Pv3k_rjlA',must:false,
        summary:'失敗不是性格缺陷，而是通往更大成功的墊腳石。愛迪生嘗試超過 1,000 次才發明燈泡。失敗教會我們勇敢、相信直覺，並看到其他可能的解決路徑。',
        keyQuote:'「我沒有失敗 1,000 次，燈泡是一項有 1,000 個步驟的發明。」——愛迪生',
        action:'接受可能的最壞情況，把每次失敗當作學習「什麼不該做」的機會。'}
    ],

// ================================================================
// GAME STATE
// ================================================================
let state = {
  name: '',
  level: 1,
  exp: 0,
  completedStages: [],
  collectedCards: [],
  watchedVideos: [],
  quizScores: {},
  streak: 1,
  lastVisit: null
};

function saveState() {
  state.lastVisit = new Date().toISOString().slice(0,10);
  localStorage.setItem('sales_dojo_state', JSON.stringify(state));
}

function loadState() {
  const saved = localStorage.getItem('sales_dojo_state');
  if (saved) {
    state = { ...state, ...JSON.parse(saved) };
    // Check streak
    const today = new Date().toISOString().slice(0,10);
    if (state.lastVisit) {
      const last = new Date(state.lastVisit);
      const now = new Date(today);
      const diff = Math.floor((now - last) / 86400000);
      if (diff === 1) state.streak++;
      else if (diff > 1) state.streak = 1;
    }
    return true;
  }
  return false;
}

// ================================================================
// GAME LOGIC
// ================================================================
function startGame() {
  const nameInput = document.getElementById('player-name-input');
  state.name = nameInput.value.trim() || '勇者';
  saveState();
  document.getElementById('welcome-screen').classList.add('hidden');
  setTimeout(() => {
    document.getElementById('welcome-screen').style.display = 'none';
    initUI();
  }, 800);
}

function initUI() {
  document.getElementById('status-bar').style.display = 'flex';
  document.getElementById('nav-tabs').style.display = 'flex';
  document.getElementById('coach-bubble').style.display = 'block';
  updateStatusBar();
  renderMap();
  renderCollection();
  // Coach welcome
  setTimeout(() => addCoachMessage('歡迎回來，' + state.name + '！今天也要全力以赴喔！準備好了嗎？🔥'), 1500);
}

function updateStatusBar() {
  const lv = getLevelInfo();
  document.getElementById('avatar-letter').textContent = state.name[0];
  document.getElementById('display-name').textContent = state.name;
  document.getElementById('display-title').textContent = lv.title;
  document.getElementById('display-level').textContent = 'Lv.' + lv.lv;
  const nextLv = LEVELS[Math.min(lv.lv, LEVELS.length - 1)];
  const prevExp = LEVELS[lv.lv - 1].exp;
  const needed = nextLv.exp - prevExp;
  const current = state.exp - prevExp;
  const pct = lv.lv >= LEVELS.length ? 100 : Math.min(100, Math.floor(current / needed * 100));
  document.getElementById('exp-text').textContent = `${state.exp} / ${nextLv.exp}`;
  document.getElementById('exp-fill').style.width = pct + '%';
  const totalCards = STAGES.reduce((a, s) => a + s.cards.length, 0);
  document.getElementById('cards-count').textContent = `${state.collectedCards.length}/${totalCards}`;
  document.getElementById('streak-count').textContent = state.streak;
}

function getLevelInfo() {
  for (let i = LEVELS.length - 1; i >= 0; i--) {
    if (state.exp >= LEVELS[i].exp) return LEVELS[i];
  }
  return LEVELS[0];
}

function addExp(amount) {
  const oldLv = getLevelInfo().lv;
  state.exp += amount;
  const newLv = getLevelInfo();
  if (newLv.lv > oldLv) showLevelUp(newLv);
  updateStatusBar();
  saveState();
}

function showLevelUp(lv) {
  const overlay = document.getElementById('levelup-overlay');
  document.getElementById('lv-new-title').textContent = lv.title;
  document.getElementById('lv-new-level').textContent = 'Lv.' + lv.lv;
  overlay.classList.add('show');
  // Sparks
  const container = document.getElementById('sparks-container');
  container.innerHTML = '';
  for (let i = 0; i < 40; i++) {
    const s = document.createElement('div');
    s.className = 'spark';
    s.style.left = '50%';
    s.style.top = '50%';
    s.style.setProperty('--tx', (Math.random() - 0.5) * 600 + 'px');
    s.style.setProperty('--ty', (Math.random() - 0.5) * 600 + 'px');
    s.style.animationDelay = Math.random() * 0.5 + 's';
    s.style.background = ['#fbbf24','#f97316','#ef4444','#22c55e','#3b82f6'][Math.floor(Math.random()*5)];
    container.appendChild(s);
  }
  // Sound effect (simple beep)
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(523, ctx.currentTime);
    osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
    osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    osc.start(); osc.stop(ctx.currentTime + 0.5);
  } catch(e) {}
  // Auto-close after 3 seconds
  setTimeout(closeLevelUp, 3000);
}

function closeLevelUp() {
  document.getElementById('levelup-overlay').classList.remove('show');
}

function renderMap() {
  const mapEl = document.getElementById('map-view');
  let html = '<div class="map-path">';

  // Stage 8 node at the very top
  const allCleared = state.completedStages.length >= 7;
  const s8Class = allCleared ? 'completed' : 'locked';
  const s8Icon = allCleared ? '👑' : '🔒';
  html += `<div class="map-node">
    <div class="node-inner ${s8Class}" style="${allCleared ? 'border-color:var(--gold);box-shadow:0 0 30px rgba(251,191,36,.35);background:linear-gradient(135deg,rgba(251,191,36,.1),var(--card-bg))' : ''}" onclick="${allCleared ? "showView('stage8')" : 'void(0)'}">
      <div class="node-icon" style="background:#fbbf2422;color:#fbbf24;${allCleared ? 'animation:boss-float 3s ease-in-out infinite' : ''}">🏆</div>
      <div class="node-info">
        <h3>第8關：宗師殿堂</h3>
        <div class="node-sub">致敬祖師爺・修煉回顧</div>
      </div>
      <div class="node-status">${s8Icon}</div>
    </div>
  </div>`;
  html += `<div class="map-connector ${allCleared ? 'completed' : ''}"></div>`;

  // Reverse order (stage 7 at top, stage 1 at bottom)
  const reversed = [...STAGES].reverse();
  reversed.forEach((stage, idx) => {
    const realIdx = STAGES.length - 1 - idx;
    const isCompleted = state.completedStages.includes(stage.id);
    const isUnlocked = stage.id === 1 || state.completedStages.includes(stage.id - 1);
    const isActive = isUnlocked && !isCompleted;
    const statusClass = isCompleted ? 'completed' : isActive ? 'active' : 'locked';
    const statusIcon = isCompleted ? '✅' : isActive ? '⚡' : '🔒';

    html += `<div class="map-node">
      <div class="node-inner ${statusClass}" onclick="${isUnlocked ? `openStage(${stage.id})` : 'void(0)'}">
        <div class="node-icon" style="background:${stage.color}22;color:${stage.color}">${stage.icon}</div>
        <div class="node-info">
          <h3>第${stage.id}關：${stage.name}</h3>
          <div class="node-sub">${stage.subtitle}</div>
        </div>
        <div class="node-status">${statusIcon}</div>
      </div>
    </div>`;
    if (idx < reversed.length - 1) {
      const connCompleted = isCompleted ? 'completed' : '';
      html += `<div class="map-connector ${connCompleted}"></div>`;
    }
  });
  html += '</div>';
  mapEl.innerHTML = html;
}

function flipCard(cardId, stageId) {
  if (!state.collectedCards.includes(cardId)) {
    state.collectedCards.push(cardId);
    addExp(15);
    saveState();
  }
  // Re-render
  openStage(stageId);
  renderCollection();
}

function toggleGuide(guideId) {
  const el = document.getElementById(guideId);
  if (el) el.classList.toggle('open');
}

function toggleAudio(audioId) {
  const el = document.getElementById(audioId);
  if (el) {
    el.classList.toggle('show');
    if (el.classList.contains('show')) {
      const audio = el.querySelector('audio');
      if (audio) audio.play();
    }
  }
}

function toggleVideo(vidKey, stageId) {
  const stage = STAGES.find(s => s.id === stageId);
  const vIdx = parseInt(vidKey.split('-v')[1]);
  // Always open YouTube link
  if (stage && stage.videos[vIdx]) {
    window.open(stage.videos[vIdx].url, '_blank');
  }
  // Only give EXP on first watch
  if (!state.watchedVideos.includes(vidKey)) {
    state.watchedVideos.push(vidKey);
    addExp(10);
    saveState();
  }
  openStage(stageId);
}

// Quiz state per stage
const quizAnswered = {};

function answerQuiz(stageId, qIdx, optIdx) {
  const stage = STAGES.find(s => s.id === stageId);
  const q = stage.quiz[qIdx];
  const key = `${stageId}-${qIdx}`;
  if (quizAnswered[key]) return;
  quizAnswered[key] = true;

  const qEl = document.getElementById(`quiz-${stageId}-${qIdx}`);
  const btns = qEl.querySelectorAll('.quiz-opt');
  btns.forEach((btn, i) => {
    btn.classList.add('disabled');
    if (i === q.ans) btn.classList.add('correct');
    else if (i === optIdx && optIdx !== q.ans) btn.classList.add('wrong');
  });

  if (optIdx === q.ans) addExp(20);

  // Check if all answered
  const allAnswered = stage.quiz.every((_, i) => quizAnswered[`${stageId}-${i}`]);
  if (allAnswered) {
    const correct = stage.quiz.filter((qq, i) => {
      const el = document.getElementById(`quiz-${stageId}-${i}`);
      return el.querySelector('.quiz-opt.correct.disabled') && !el.querySelector('.quiz-opt.wrong');
    }).length;
    // Actually count correct answers
    let score = 0;
    stage.quiz.forEach((qq, i) => {
      const el = document.getElementById(`quiz-${stageId}-${i}`);
      const wrongEl = el.querySelector('.quiz-opt.wrong');
      if (!wrongEl) score++;
    });

    state.quizScores[stageId] = score;
    saveState();

    const resultEl = document.getElementById(`boss-result-${stageId}`);
    const msgEl = document.getElementById(`boss-msg-${stageId}`);
    const btnEl = document.getElementById(`boss-btn-${stageId}`);

    if (score === stage.quiz.length) {
      msgEl.textContent = `🎉 完美通關！${score}/${stage.quiz.length} 全對！`;
      msgEl.style.color = 'var(--green)';
      btnEl.style.display = 'inline-block';
      addExp(50);
    } else {
      msgEl.textContent = `得分：${score}/${stage.quiz.length}。不完美，但你已經在進步了！`;
      msgEl.style.color = 'var(--gold)';
      btnEl.textContent = '繼續前進！';
      btnEl.style.display = 'inline-block';
    }
    resultEl.style.display = 'block';
  }
}

function completeStage(stageId) {
  if (!state.completedStages.includes(stageId)) {
    state.completedStages.push(stageId);
    addExp(100);
    saveState();
    addCoachMessage(`太棒了！你通過了第${stageId}關「${STAGES[stageId-1].name}」！${stageId < 7 ? '下一關等著你！繼續衝！🔥' : '你已經完成所有修煉，成為銷售宗師了！👑'}`);
  }
  showView('map');
  renderMap();
}

// COLLECTION VIEW

function renderCollection() {
  const el = document.getElementById('collection-view');
  let html = '<h2 style="text-align:center;color:var(--gold);margin-bottom:20px">🃏 技能卡牌圖鑑</h2>';

  STAGES.forEach(stage => {
    const collected = stage.cards.filter(c => state.collectedCards.includes(c.id)).length;
    const total = stage.cards.length;
    const allCollected = collected === total;

    html += `<div class="collection-stage">
      <div class="collection-stage-header">
        <span style="font-size:1.2rem">${stage.icon}</span>
        <h3>${stage.name}</h3>
        ${allCollected ? '<span style="color:var(--gold)">🏆</span>' : ''}
        <span class="collection-progress">${collected}/${total}</span>
      </div>
      <div class="collection-grid">
        ${stage.cards.map(card => {
          const has = state.collectedCards.includes(card.id);
          return `<div class="mini-card ${has ? 'collected' : 'locked'}" ${has ? `onclick="openCardModal('${card.id}')"` : ''}>
            <div class="mini-icon">${has ? (card.rarity === 'legend' ? '⭐' : '🃏') : '❓'}</div>
            <div class="mini-name">${has ? card.title : '???'}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });

  el.innerHTML = html;
}

// ================================================================
// VIEW SWITCHING
// ================================================================
function showView(view) {
  document.getElementById('map-view').style.display = view === 'map' ? 'block' : 'none';
  document.getElementById('stage-view').style.display = view === 'stage' ? 'block' : 'none';
  document.getElementById('collection-view').style.display = view === 'collection' ? 'block' : 'none';
  document.getElementById('stage8-view').style.display = view === 'stage8' ? 'block' : 'none';

  document.querySelectorAll('.nav-tab').forEach((tab, i) => {
    tab.classList.toggle('active', (i === 0 && (view === 'map' || view === 'stage' || view === 'stage8')) || (i === 1 && view === 'collection'));
  });

  if (view === 'map') renderMap();
  if (view === 'stage8') renderStage8();
}

let chatOpen = false;

function toggleChat() {
  chatOpen = !chatOpen;
  document.getElementById('coach-chat').classList.toggle('open', chatOpen);
  if (chatOpen) {
    if (document.getElementById('chat-messages').children.length === 0) {
      addCoachMessage('喲！有什麼需要教練幫忙的嗎？儘管開口！');
    }
    renderChatOptions();
  }
}

function addCoachMessage(text) {
  const el = document.getElementById('chat-messages');
  const msg = document.createElement('div');
  msg.className = 'chat-msg coach';
  msg.textContent = text;
  el.appendChild(msg);
  el.scrollTop = el.scrollHeight;
}

function addPlayerMessage(text) {
  const el = document.getElementById('chat-messages');
  const msg = document.createElement('div');
  msg.className = 'chat-msg player';
  msg.textContent = text;
  el.appendChild(msg);
  el.scrollTop = el.scrollHeight;
}

function renderChatOptions() {
  const el = document.getElementById('chat-options');
  const hasCards = state.collectedCards.length > 0;
  const options = [
    { text: '教練，我被客戶拒絕了...', key: 'rejected' },
    { text: '教練，教我開場白！', key: 'opening' },
    { text: '教練，我需要打氣！', key: 'motivate' },
    { text: '教練，今天該學什麼？', key: 'next' }
  ];

  el.innerHTML = options.map(opt =>

function chatRespond(key, playerText) {
  addPlayerMessage(playerText);

  if (key === 'daily_card') {
    handleDailyCard();
    return;
  }
  if (key === 'quiz_me') {
    handleQuizMe();
    return;
  }

  let response;
  if (key === 'next') {
    const nextStage = STAGES.find(s => !state.completedStages.includes(s.id));
    if (nextStage) {
      response = `你目前在第${nextStage.id}關「${nextStage.name}」！重點是：${nextStage.goal} 去闖關吧，我在這裡等你的好消息！💪`;
    } else {
      response = getMasterLearningAdvice();
    }
  } else {
    const pool = COACH_RESPONSES[key];
    response = pool[Math.floor(Math.random() * pool.length)];
  }

  setTimeout(() => {
    addCoachMessage(response);
    renderChatOptions();
  }, 500);
}

// ===== 📚 通關後學習建議 =====
function getMasterLearningAdvice() {
  const advicePool = [];

  // 類型1：推薦複習某一關的影片
  STAGES.forEach(s => {
    const unwatched = s.videos.filter((v, i) => !state.watchedVideos.includes(`s${s.id}-v${i}`));
    if (unwatched.length > 0) {
      const vid = unwatched[Math.floor(Math.random() * unwatched.length)];
      advicePool.push(`🎬 宗師也要溫故知新！第${s.id}關「${s.name}」裡還有 ${unwatched.length} 支影片你沒看過。推薦你看「${vid.title}」，打開影片看看祖師爺怎麼說！`);
    }
    // 推薦複習已看過的影片
    const watched = s.videos.filter((v, i) => state.watchedVideos.includes(`s${s.id}-v${i}`) && v.summary);
    if (watched.length > 0) {
      const vid = watched[Math.floor(Math.random() * watched.length)];
      advicePool.push(`📖 今天重新複習第${s.id}關「${s.name}」的「${vid.title}」吧！記住：${vid.keyQuote} 去點開影片下方的「學習重點」複習一下！`);
    }
  });

  // 類型2：推薦複習某張卡牌
  const collectedCards = [];
  STAGES.forEach(s => s.cards.forEach(c => {
    if (state.collectedCards.includes(c.id)) collectedCards.push({card: c, stage: s});

    const pick = collectedCards[Math.floor(Math.random() * collectedCards.length)];

  // 類型3：實戰挑戰
  const challenges = [
    '💡 今日實戰挑戰：找一位客戶，用「沉默黃金法則」——提出關鍵問題後，忍住不說話，等對方先開口！回來告訴我結果！🔥',
    '💡 今日實戰挑戰：打 5 通陌生開發電話，不要在意結果，專注在「我有沒有問到好問題」！記住，100 通電話法則的重點是過程！📞',
    '💡 今日實戰挑戰：找一位滿意的老客戶，真誠地問他：「您有沒有認識的朋友也可能需要我們的服務？」勇敢要求轉介紹！🤝',
    '💡 今日實戰挑戰：今天跟客戶聊天時，刻意多聽少說。用這三個問題開場：「你做什麼工作？」「怎麼進入這行的？」「然後你做了什麼？」👂',
    '💡 今日實戰挑戰：找出你今天的「青蛙」——最重要但最想拖延的任務，在做任何其他事之前先完成它！🐸',
    '💡 今日實戰挑戰：準備一個真實客戶的成功故事，今天銷售時用故事取代數據來打動對方。先打動心，再說服腦！📖',
    '💡 今日實戰挑戰：用「間接努力法則」——今天對三個人表達真誠的讚賞，讓他們覺得自己很重要。觀察對方的反應！✨',

    '💡 今日實戰挑戰：計算你的時薪，然後審視今天的待辦清單——有沒有低於你時薪價值的任務可以委派出去？⏰',

// ===== 🎴 今日修煉指引 =====
function handleDailyCard() {
  const today = new Date().toISOString().slice(0,10);
  const dailyKey = 'sales_dojo_daily_card';
  const saved = localStorage.getItem(dailyKey);

  if (saved) {
    const data = JSON.parse(saved);
    if (data.date === today) {
      setTimeout(() => {
        addCoachMessage(`你今天已經抽過了！今日指引是「${data.cardTitle}」💡 先去實踐吧，明天再來抽！🔥`);
        renderChatOptions();
      }, 500);
      return;
    }
  }

  // Pick random collected card
  const collectedCards = [];
  STAGES.forEach(s => s.cards.forEach(c => {
    if (state.collectedCards.includes(c.id)) collectedCards.push(c);
  }));

  if (collectedCards.length === 0) {
    setTimeout(() => {
      addCoachMessage('你還沒有收集任何卡牌！去闖關翻牌吧！🃏');
      renderChatOptions();
    }, 500);
    return;
  }

  const card = collectedCards[Math.floor(Math.random() * collectedCards.length)];
  const intro = DAILY_CARD_INTROS[Math.floor(Math.random() * DAILY_CARD_INTROS.length)];

  localStorage.setItem(dailyKey, JSON.stringify({ date: today, cardTitle: card.title }));

  setTimeout(() => {
    addCoachMessage(`🎴 ${intro}「${card.title}」！\n\n${card.content}\n\n今天跟客戶互動時，試著運用這個心法吧！💪🔥`);
    renderChatOptions();
  }, 500);
}

  // Filter to only collected cards
  const available = CARD_QUIZ_POOL.filter(q => state.collectedCards.includes(q.cardId));

  if (available.length === 0) {
    setTimeout(() => {
      addCoachMessage('你還沒有收集任何卡牌，沒辦法出題！快去闖關吧！🃏');
      renderChatOptions();
    }, 500);
    return;
  }

  const quiz = available[Math.floor(Math.random() * available.length)];

  setTimeout(() => {
    addCoachMessage(`🧠 快問快答！來測試你的心法修煉！`);
    // Show quiz options
    const el = document.getElementById('chat-options');
    el.innerHTML = `<div style="font-size:.82rem;color:var(--gold);font-weight:700;padding:4px 8px;margin-bottom:4px">${quiz.q}</div>` +
      quiz.opts.map((opt, i) =>
        `<button class="chat-opt-btn" onclick="answerCoachQuiz(${i},${quiz.ans},'${opt.replace(/'/g,"\\'")}','${quiz.q.replace(/'/g,"\\'")}')">${String.fromCharCode(65+i)}. ${opt}</button>`
      ).join('');
  }, 500);
}

function answerCoachQuiz(selected, correct, selectedText, question) {
  addPlayerMessage(selectedText);

  setTimeout(() => {
    if (selected === correct) {
      addCoachMessage('🔥 答對了！不愧是修煉有成的勇者！+5 EXP 💪');
      addExp(5);
    } else {
      const correctLetter = String.fromCharCode(65 + correct);
      addCoachMessage(`😤 答錯了！正確答案是 ${correctLetter}！回去翻翻那張卡複習一下吧！`);
    }
    renderChatOptions();
  }, 500);
}

// ===== 卡牌 Modal =====
function openCardModal(cardId) {
  let card = null;
  STAGES.forEach(s => s.cards.forEach(c => { if (c.id === cardId) card = c; }));
  if (!card) return;

  const overlay = document.getElementById('card-modal-overlay');
  const modal = document.getElementById('card-modal');
  const rarityText = card.rarity === 'legend' ? '⭐ 傳說' : card.rarity === 'rare' ? '💎 稀有' : '普通';
  const rarityClass = card.rarity === 'legend' ? 'cm-legend' : card.rarity === 'rare' ? 'cm-rare' : '';

  document.getElementById('cm-rarity').textContent = rarityText;
  document.getElementById('cm-title').textContent = card.title;
  document.getElementById('cm-content').textContent = card.content;

  modal.className = `card-modal ${rarityClass}`;
  modal.classList.remove('flipping');
  overlay.classList.add('show');

  // Auto flip after a short delay
  setTimeout(() => modal.classList.add('flipping'), 300);
}

function closeCardModal() {
  document.getElementById('card-modal-overlay').classList.remove('show');
  document.getElementById('card-modal').classList.remove('flipping');
}

function launchFireworks() {
  const overlay = document.getElementById('fireworks-overlay');
  overlay.classList.add('show');
  overlay.innerHTML = '';

  const colors = ['#fbbf24','#f97316','#ef4444','#22c55e','#3b82f6','#8b5cf6','#06b6d4'];
  let round = 0;
  const maxRounds = 5;

  function burst() {
    if (round >= maxRounds) {
      setTimeout(() => overlay.classList.remove('show'), 2000);
      return;
    }
    // Random position
    const cx = 15 + Math.random() * 70; // 15%~85% of screen width
    const cy = 10 + Math.random() * 50; // 10%~60% of screen height

    for (let i = 0; i < 30; i++) {
      const dot = document.createElement('div');
      dot.className = 'firework';
      dot.style.left = cx + '%';
      dot.style.top = cy + '%';
      const angle = (Math.PI * 2 / 30) * i + Math.random() * 0.3;
      const dist = 80 + Math.random() * 120;
      dot.style.setProperty('--fx', Math.cos(angle) * dist + 'px');
      dot.style.setProperty('--fy', Math.sin(angle) * dist + 'px');
      dot.style.background = colors[Math.floor(Math.random() * colors.length)];
      dot.style.animationDelay = Math.random() * 0.3 + 's';
      dot.style.width = (3 + Math.random() * 4) + 'px';
      dot.style.height = dot.style.width;
      overlay.appendChild(dot);
    }
    round++;
    setTimeout(burst, 600);
  }

  // Play celebration sound
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523, 659, 784, 1047];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.15);
      gain.gain.setValueAtTime(0.12, ctx.currentTime + i * 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.4);
      osc.start(ctx.currentTime + i * 0.15);
      osc.stop(ctx.currentTime + i * 0.15 + 0.4);
    });
  } catch(e) {}

  burst();
}
